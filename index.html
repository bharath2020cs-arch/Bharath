<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Laduu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2; /* Soft Pink */
            color: #d63384;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .page { display: none; animation: fadeIn 0.8s ease-in-out; }
        .active { display: block; }

        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.5; }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); background: #ff758f; }

        .photos {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .photos img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            border: 3px solid #ffb6c1;
            object-fit: cover;
            transform: rotate(-5deg);
        }

        .photos img:nth-child(2) { transform: rotate(5deg); }

        .letter {
            background: #fff0f3;
            border: 2px dashed #ff4d6d;
            padding: 20px;
            border-radius: 10px;
            animation: slideUp 1s ease-out;
        }

        .gift-box {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gift-box:hover { transform: bounce; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .cake-bg { position: absolute; font-size: 25px; opacity: 0.2; z-index: -1; }
    </style>
</head>
<body>

    <div class="cake-bg" style="top:10%; left:10%;">🍰</div>
    <div class="cake-bg" style="top:20%; right:15%;">🎂</div>
    <div class="cake-bg" style="bottom:10%; left:20%;">🧁</div>
    <div class="cake-bg" style="bottom:15%; right:10%;">🍓</div>

    <div class="container">
        
        <div id="page1" class="page active">
            <h1>Hei Laduu! 🍰</h1>
            <p>I made a little surprise for you... ready?</p>
            <button onclick="nextPage(2)">Click Here ✨</button>
        </div>

        <div id="page2" class="page">
            <h1>Happy Birthday Harini! 🥳</h1>
            <p>It has been <strong>7,305 days</strong> since my angel was born into this world. ✨</p>
            <button onclick="nextPage(3)">Next Button ➡️</button>
        </div>

        <div id="page3" class="page">
            <div class="photos">
                <img src="photo1.jpg" alt="Harini 1">
                <img src="photo2.jpg" alt="Harini 2">
                <img src="photo3.jpg" alt="Harini 3">
            </div>
            <div class="letter">
                <h1 style="font-size: 2.5rem; margin: 0;">I Love You Pondatti ❤️</h1>
                <p>You don't know how much I Love you.</p>
            </div>
            <button onclick="nextPage(4)">Next Button ➡️</button>
        </div>

        <div id="page4" class="page">
            <p>Here's a surprise for you...</p>
            <div class="gift-box" id="giftBox" onclick="revealGif()">🎁</div>
            <div id="finalGif" style="display:none;">
                <img src="Hug.gif" alt="Hug" style="width:100%; border-radius: 15px;">
                <p>Stay with me forever! 🥰</p>
            </div>
        </div>

    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
        }

        function revealGif() {
            document.getElementById('giftBox').style.display = 'none';
            document.getElementById('finalGif').style.display = 'block';
        }
    </script>
</body>
</html>
